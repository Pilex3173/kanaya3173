<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PILEX3173 | Validator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #ffffff url('watermark_pudar.png') no-repeat center center fixed;
      background-size: contain;
      color: #111111;
      font-size: 0.875rem;
    }

    header {
      background-color: #f0f0f0;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #cccccc;
    }

    .logo-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-wrapper img {
      height: 28px;
      width: 28px;
      border-radius: 50%;
    }

    .logo.anime-logo {
      font-family: 'Press Start 2P', cursive;
      font-size: 1rem;
      color: #000000;
    }

    main {
      padding: 1.5rem;
    }

    section {
      background-color: #fff8dc;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 2px dashed #000000;
    }

    section h2 {
      font-size: 1.3rem;
      color: #111111;
      border-bottom: 1px dashed #000000;
      padding-bottom: 0.4rem;
    }

    .tab-buttons {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .tab-button {
      background-color: #000;
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
    }

    .tab-button.active {
      background-color: #444;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.2rem;
    }

    .validator-card, .node-card {
      border-radius: 16px;
      padding: 1.5rem;
      background: #ffffff;
      border: 2px dashed #000000;
      color: #111111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
      cursor: pointer;
      text-align: center;
      min-height: 160px;
    }

    .validator-card:hover, .node-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
    }

    .validator-card h3, .node-card h3 {
      font-size: 1.1rem;
      margin: 0.5rem 0;
    }

    .status-text {
      font-size: 0.95rem;
    }

    .status-online {
      color: #2e7d32;
      font-weight: bold;
    }

    .status-offline {
      color: #c62828;
      font-weight: bold;
    }

    .chain-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-wrapper">
      <img src="logo.jpg" alt="Logo">
      <div class="logo anime-logo">PILEX3173</div>
    </div>
  </header>

  <main>
    <section id="status">
      <h2>Live Validator Status</h2>
      <div class="tab-buttons">
        <button onclick="showPanel('testnet')" class="tab-button active">Testnet</button>
        <button onclick="showPanel('mainnet')" class="tab-button">Mainnet</button>
      </div>

      <div id="panel-testnet" class="status-grid">
        <!-- Testnet validator cards -->
        <div class="validator-card" data-url="https://explorer.maouam.nodelab.my.id/lumera-testnet/staking/lumeravaloper177z7qclpqs5mcwwj7g2j4k5s28hjrtgtgl6g7w">
          <img src="assets/lumera.png" alt="Lumera Logo" class="chain-logo" />
          <h3>Lumera</h3>
          <p class="status-text">Checking...</p>
        </div>
        <div class="validator-card" data-url="https://testnet.ping.pub/empe/staking/empevaloper1cf7kj0rcfteqepuh8cjxlrkw432xyzzm3hcv4l">
          <img src="assets/empeiria.jpg" alt="Empe Logo" class="chain-logo" />
          <h3>Empe</h3>
          <p class="status-text">Checking...</p>
        </div>
      </div>

      <div id="panel-mainnet" class="status-grid" style="display: none;">
        <!-- Mainnet validator cards -->
        <div class="validator-card" data-url="#">
          <img src="assets/comingsoon.png" alt="Coming Soon" class="chain-logo" />
          <h3>Coming Soon</h3>
          <p class="status-text">Checking...</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    function showPanel(panelId) {
      document.getElementById("panel-testnet").style.display = panelId === "testnet" ? "grid" : "none";
      document.getElementById("panel-mainnet").style.display = panelId === "mainnet" ? "grid" : "none";
      document.querySelectorAll(".tab-button").forEach(btn => btn.classList.remove("active"));
      document.querySelector(`.tab-button[onclick*='${panelId}']`).classList.add("active");
    }

    document.querySelectorAll(".validator-card, .node-card").forEach((card) => {
      const url = card.getAttribute("data-url");
      const statusEl = card.querySelector(".status-text");
      if (!url || !statusEl) return;

      fetch(url, { method: "GET", mode: "no-cors" })
        .then(() => {
          statusEl.textContent = "🟢 Online";
          statusEl.classList.add("status-online");
        })
        .catch(() => {
          statusEl.textContent = "🔴 Offline";
          statusEl.classList.add("status-offline");
        });

      card.addEventListener("click", () => {
        if (url) window.open(url, "_blank");
      });
    });
  </script>
</body>
</html>
