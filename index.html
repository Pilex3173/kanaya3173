<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PILEX3173 | Validator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #ffffff url('watermark_pudar.png') no-repeat center center fixed;
      background-size: contain;
      color: #111111;
      font-size: 0.875rem;
    }

    header {
      background-color: #f0f0f0;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #cccccc;
    }

    .logo-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-wrapper img {
      height: 28px;
      width: 28px;
      border-radius: 50%;
    }

    .logo.anime-logo {
      font-family: 'Press Start 2P', cursive;
      font-size: 1rem;
      color: #000000;
    }

    /* Pactus */
    .pactus-link {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: #000;
      font-size: 0.8rem;
    }

    .pactus-link img {
      width: 22px;
      height: 22px;
    }

    main {
      padding: 1.5rem;
    }

    section {
      background-color: #fff8dc;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 2px dashed #000000;
    }

    section h2 {
      font-size: 1.3rem;
      color: #111111;
      border-bottom: 1px dashed #000000;
      padding-bottom: 0.4rem;
    }

    section p {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #333333;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.2rem;
    }

    .validator-card, .node-card {
      border-radius: 16px;
      padding: 1.5rem;
      background: #ffffff;
      border: 2px dashed #000000;
      color: #111111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
      cursor: pointer;
      text-align: center;
      min-height: 160px;
    }

    .validator-card:hover, .node-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
    }

    .validator-card h3, .node-card h3 {
      font-size: 1.1rem;
      margin: 0.5rem 0;
    }

    .status-text {
      font-size: 0.95rem;
    }

    .status-online {
      color: #2e7d32;
      font-weight: bold;
    }

    .status-offline {
      color: #c62828;
      font-weight: bold;
    }

    a.validator-card {
      text-decoration: none;
    }

    #menu-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 2rem 0;
    }

    .menu-box {
      background-color: #000000;
      color: #ffffff;
      padding: 1rem 2rem;
      border-radius: 10px;
      font-size: 1.4rem;
      font-weight: bold;
      text-decoration: none;
      border: 2px solid #000000;
      transition: all 0.3s ease;
    }

    .menu-box:hover {
      background-color: #222;
    }

    #contact a {
      color: #000000;
      font-weight: bold;
      font-size: 1.5rem;
      text-decoration: none;
    }

    #contact a:hover {
      opacity: 0.8;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background-color: #f0f0f0;
      color: #333333;
      font-size: 0.85rem;
      border-top: 2px dashed #000000;
    }

    @media (max-width: 600px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      #menu-links {
        flex-direction: column;
        align-items: center;
      }
    }

    .chain-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
      display: block;
      margin: 0 auto 8px;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo-wrapper">
      <img src="logo.jpg" alt="Logo">
      <div class="logo anime-logo">PILEX3173</div>
    </div>

    <!-- Pactus -->
    <a href="https://pactus.org/" target="_blank" class="pactus-link">
      <img src="https://raw.githubusercontent.com/pactus-project/pactus-website/main/static/images/logo/pactus-logo-circle.svg" alt="Pactus">
      <span>Pactus</span>
    </a>
  </header>

  <main>
    <section id="home">
      <h2>PILEX3173 Validator And Node Service</h2>
      <p class="tagline">We Trusted Validator for Decentralized Future</p>
    </section>

    <!-- (SEMUA KONTEN KAMU TETAP, TIDAK DIUBAH) -->

  </main>

  <footer>
    <p>© 2025 PILEX3173. Trusted Validator ⚙️</p>

    <div style="margin-top:8px;">
      <a href="https://pactus.org/" target="_blank" class="pactus-link">
        <img src="https://raw.githubusercontent.com/pactus-project/pactus-website/main/static/images/logo/pactus-logo-circle.svg" alt="Pactus">
        <span>Powered by Pactus Network</span>
      </a>
    </div>
  </footer>

  <script>
    document.querySelectorAll(".validator-card, .node-card").forEach((card) => {
      const url = card.getAttribute("data-url");
      const statusEl = card.querySelector(".status-text");
      if (!url || !statusEl) return;

      fetch(url, { method: "GET", mode: "no-cors" })
        .then(() => {
          statusEl.textContent = "🟢 Online";
          statusEl.classList.add("status-online");
        })
        .catch(() => {
          statusEl.textContent = "🔴 Offline";
          statusEl.classList.add("status-offline");
        });

      card.addEventListener("click", () => {
        if (url) window.open(url, "_blank");
      });
    });
  </script>
</body>
</html>
