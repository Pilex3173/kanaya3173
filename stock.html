<!DOCTYPE html>
<html>
<head>
  <title>Stok LPG</title>
</head>
<body>
  <h1>Stok Pangkalan LPG</h1>
  <pre id="data">Memuat data...</pre>

  <script>
    fetch("https://drive.google.com/uc?id=1RqXmh4FtXI0JPdWo3pUU7NzvhcOESZV4&export=download")
      .then(response => response.json())
      .then(data => {
        document.getElementById("data").textContent = JSON.stringify(data, null, 2);
      });
  </script>
</body>
</html>
